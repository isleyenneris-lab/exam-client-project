<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פרטי מבחן</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="teacher.html">חזרה לדף מורה</a>
      <button id="logoutBtn" class="btn btn-outline-light">התנתקות</button>
    </div>
  </nav>

  <main class="container py-4">

    <!-- כאן יוצג מידע כללי על המבחן -->
    <div id="examInfo" class="mb-4"></div>

    <div class="row g-4">

      <!-- טופס הוספת שאלה -->
      <section class="col-lg-5">
        <div class="card shadow-sm">

          <div class="card-header bg-success text-white">
            הוספת שאלה
          </div>

          <div class="card-body">
            <form id="questionForm">

              <div class="mb-3">
                <label class="form-label">טקסט השאלה</label>
                <input id="questionText" class="form-control" required>
              </div>

              <input id="answer1" class="form-control mb-2" placeholder="תשובה 1" required>
              <input id="answer2" class="form-control mb-2" placeholder="תשובה 2" required>
              <input id="answer3" class="form-control mb-2" placeholder="תשובה 3" required>
              <input id="answer4" class="form-control mb-2" placeholder="תשובה 4" required>

              <div class="mb-3">
                <label class="form-label">מספר התשובה הנכונה</label>
                <input id="correctIndex" type="number" min="1" max="4" class="form-control" required>
              </div>

              <button class="btn btn-success w-100">הוסף שאלה</button>
            </form>

            <div id="message" class="mt-3"></div>
          </div>
        </div>
      </section>

      <!-- שאלות ותוצאות -->
      <section class="col-lg-7">

        <div class="card shadow-sm mb-4">
          <div class="card-header bg-dark text-white">
            שאלות במבחן
          </div>
          <div class="card-body" id="questionList"></div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header bg-warning">
            תוצאות סטודנטים
          </div>
          <div class="card-body" id="resultList"></div>
        </div>

      </section>

    </div>
  </main>

  <script type="module" src="js/pages/examDetailsPage.js"></script>
</body>
</html>
