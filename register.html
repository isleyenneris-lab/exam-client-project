<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרשמה</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="container py-5 small-page">
    <div class="card shadow">

      <div class="card-header bg-primary text-white">
        <h2 class="m-0">הרשמה</h2>
      </div>

      <div class="card-body">

        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label">שם מלא</label>
            <input id="fullName" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">אימייל</label>
            <input id="email" type="email" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">סיסמה</label>
            <input id="password" type="password" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">סוג משתמש</label>
            <select id="role" class="form-select" required>
              <option value="teacher">מורה</option>
              <option value="student">סטודנט</option>
            </select>
          </div>

          <button class="btn btn-primary w-100">הרשמה</button>
        </form>

        <div id="message" class="mt-3"></div>

        <p class="mt-3 text-center">
          כבר יש חשבון?
          <a href="login.html">כניסה</a>
        </p>

      </div>
    </div>
  </main>

  <script type="module" src="js/pages/registerPage.js"></script>
</body>
</html>
