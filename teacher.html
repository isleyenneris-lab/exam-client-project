<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דף מורה</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="teacher.html">דף מורה</a>
      <button id="logoutBtn" class="btn btn-outline-light">התנתקות</button>
    </div>
  </nav>

  <main class="container py-4">
    <h1 id="welcomeTitle" class="mb-4"></h1>

    <div class="row g-4">

      <!-- צד ימין/שמאל: יצירת מבחן -->
      <section class="col-lg-5">
        <div class="card shadow-sm">

          <div class="card-header bg-primary text-white">
            יצירת מבחן חדש
          </div>

          <div class="card-body">
            <form id="examForm">

              <div class="mb-3">
                <label class="form-label">שם המבחן</label>
                <input id="title" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">תיאור</label>
                <textarea id="description" class="form-control" rows="3"></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label">קטגוריה</label>
                <input id="category" class="form-control" placeholder="לדוגמה: JavaScript">
              </div>

              <div class="mb-3">
                <label class="form-label">משך זמן בדקות</label>
                <input id="duration" type="number" min="1" class="form-control" value="30">
              </div>

              <button class="btn btn-primary w-100">שמור מבחן</button>
            </form>

            <div id="message" class="mt-3"></div>
          </div>
        </div>
      </section>

      <!-- רשימת מבחנים -->
      <section class="col-lg-7">
        <div class="card shadow-sm">

          <div class="card-header bg-dark text-white">
            המבחנים שלי
          </div>

          <div class="card-body">
            <div id="examList"></div>
          </div>

        </div>
      </section>

    </div>
  </main>

  <script type="module" src="js/pages/teacherPage.js"></script>
</body>
</html>
